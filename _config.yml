# 사이트 설정

# 테마 가져오기
theme: jekyll-theme-chirpy

# 웹페이지 언어 › http://www.lingoes.net/en/translator/langcode.htm
# 만약 _data/locales 폴더 내 파일 중 하나와 같은 이름이라면, 레이아웃 언어도 함께 변경됩니다.
# 그렇지 않으면 레이아웃 언어는 기본값인 'en'을 사용합니다.
lang: ko-KR

# 타임존 변경 › https://kevinnovak.github.io/Time-Zone-Picker
timezone: Asia/Seoul

# jekyll-seo-tag 설정 › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: 블로그 이름 # 메인 제목

tagline: 기술 블로그 # 부제목으로 표시됩니다

description: >- # SEO 메타태그 및 atom 피드에 사용됩니다
  기술 정보와 개발 경험을 공유하는 블로그입니다.

# 사이트의 프로토콜 및 호스트 이름을 입력하세요.
# 예: 'https://username.github.io', 끝에 '/'를 붙이지 마세요.
url: "https://lmsspace7.github.io"

github:
  username: lmsspace7 # GitHub 사용자 이름으로 변경하세요

twitter:
  username: twitter_username # Twitter 사용자 이름으로 변경하세요

social:
  # 본인의 전체 이름으로 변경하세요.
  # 게시물의 기본 저자 및 푸터의 저작권 소유자로 표시됩니다
  name: 홍길동 # 실제 이름으로 변경하세요
  email: example@domain.com # 이메일 주소로 변경하세요
  links:
    # 첫 번째 요소는 저작권 소유자의 링크로 사용됩니다
    - https://twitter.com/username # Twitter 홈페이지로 변경하세요
    - https://github.com/lmsspace7 # GitHub 홈페이지로 변경하세요
    # 아래 항목의 주석을 해제하여 더 많은 소셜 링크를 추가할 수 있습니다
    # - https://www.facebook.com/username
    # - https://www.linkedin.com/in/username

# 사이트 인증 설정
webmaster_verifications:
  google: # Google 인증 코드 입력
  bing: # Bing 인증 코드 입력
  alexa: # Alexa 인증 코드 입력
  yandex: # Yandex 인증 코드 입력
  baidu: # Baidu 인증 코드 입력
  facebook: # Facebook 인증 코드 입력

# ↑ --------------------------
# jekyll-seo-tag 설정 끝

# 웹 분석 설정
analytics:
  google:
    id: # Google Analytics ID 입력
  goatcounter:
    id: # GoatCounter ID 입력
  umami:
    id: # Umami ID 입력
    domain: # Umami 도메인 입력
  matomo:
    id: # Matomo ID 입력
    domain: # Matomo 도메인 입력
  cloudflare:
    id: # Cloudflare 웹 분석 토큰 입력
  fathom:
    id: # Fathom 사이트 ID 입력

# 페이지 조회수 설정
pageviews:
  provider: # 현재 'goatcounter'만 지원

# 색상 스키마 설정
#
# 참고: 비워두면 기본적으로 시스템 색상 설정을 따르며,
# 사이드바 하단 왼쪽에 다크 모드와 라이트 모드를 전환하는 토글이 있습니다.
#
# 사용 가능한 옵션:
#
#     light — 라이트 색상 스키마 사용
#     dark — 다크 색상 스키마 사용
#
theme_mode: # [light | dark]

# 미디어 리소스의 CDN 엔드포인트
# 설정되면 CDN URL이 '/'로 시작하는 모든 미디어 리소스
# (사이트 아바타, 게시물 이미지, 오디오 및 비디오 파일) 경로에 추가됩니다
#
# 예: 'https://cdn.com'
cdn: "https://chirpy-img.netlify.app"

# 사이드바의 아바타(프로필 이미지), 로컬 또는 CORS 리소스 지원
# 이미지 파일을 assets/img 폴더에 넣고 경로를 지정하면 됩니다.
# 예: "/assets/img/profile.jpg"
avatar: "/commons/avatar.jpg"

# SEO의 `og:image` 메타 태그에서 사용되는 사이트 전체 소셜 미리보기 이미지의 URL
# 이는 front matter에서 사용자 정의 `page.image`로 덮어쓸 수 있습니다
social_preview_image: # 문자열, 로컬 또는 CORS 리소스

# boolean 타입, 게시물의 TOC(목차)에 대한 전역 스위치
toc: true

comments:
  # 게시물 댓글 시스템에 대한 전역 스위치. 비워두면 비활성화됩니다.
  provider: # [disqus | utterances | giscus]
  # 제공자 옵션은 다음과 같습니다:
  disqus:
    shortname: # Disqus 약식 이름을 입력하세요. › https://help.disqus.com/en/articles/1717111-what-s-a-shortname
  # utterances 설정 › https://utteranc.es/
  utterances:
    repo: # <gh-username>/<repo>
    issue_term: # < url | pathname | title | ...>
  # Giscus 옵션 › https://giscus.app
  giscus:
    repo: # <gh-username>/<repo>
    repo_id:
    category:
    category_id:
    mapping: # 선택 사항, 기본값은 'pathname'
    strict: # 선택 사항, 기본값은 '0'
    input_position: # 선택 사항, 기본값은 'bottom'
    lang: ko # 선택 사항, 기본값은 `site.lang` 값
    reactions_enabled: # 선택 사항, 기본값은 '1'

# 자체 호스팅 정적 자산, 선택 사항 › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # boolean, 비워두면 false를 의미합니다
    # Jekyll 환경 지정, 비워두면 둘 다를 의미합니다
    # 'assets.self_host.enabled'가 'true'인 경우에만 작동합니다
    env: # [development | production]

pwa:
  enabled: true # PWA 기능 옵션 (설치 가능)
  cache:
    enabled: true # PWA 오프라인 캐시 옵션
    # 여기에 정의된 경로는 PWA 캐시에서 제외됩니다.
    # 일반적으로 현재 웹사이트와 동일한 도메인 이름을 공유하는
    # 다른 웹사이트의 'baseurl'입니다.
    deny_paths:
      # - "/example"  # `<SITE_URL>/example/*`와 일치하는 URL은 PWA에 의해 캐시되지 않습니다

paginate: 10

# 사이트의 기본 URL
baseurl: ""

# ------------ 아래 옵션은 수정을 권장하지 않습니다 ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge 옵션 › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: "" # 빈 문자열은 프로젝트의 모든 파일을 의미합니다
      type: posts
    values:
      layout: post
      comments: true # 게시물에서 댓글 활성화
      toc: true # 게시물에 TOC 열 표시
      # 이 프로젝트의 다른 모든 게시물 링크 코드를 업데이트할 자신이 있는 경우가 아니면
      # 다음 매개변수를 수정하지 마세요.
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # `site.collections` 참조
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - rollup.config.js
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
